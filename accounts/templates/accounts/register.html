{% extends "core/base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-12 bg-white p-8 rounded shadow">
    <h2 class="text-2xl mb-6">Register</h2>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full bg-green-500 text-white py-2 rounded">Register</button>
    </form>
</div>
{% endblock %}
