services:
  - type: web
    name: courtreach-web
    env: python
    branch: main
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput"
    startCommand: "gunicorn courtreach.wsgi --log-file -"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "courtreach-progress.onrender.com courtreach.onrender.com"
    staticPublishPath: "staticfiles"
